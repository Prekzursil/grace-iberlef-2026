# GRACE @ IberLEF 2026 - Track 2 BETO baseline
#
# Track 2: MIR clinical case reasoning.
# Balanced data: Premise ≈ Claim, Support ≈ Attack, relevant ≈ not-relevant.
# 128 train / 24 dev cases.
tag: t2-beto-base-20ep
track: 2
backbone: dccuchile/bert-base-spanish-wwm-cased

task:
  subtask1:
    max_length: 256
    include_correct_option: true
    epochs: 20

  subtask2:
    max_length: 512
    stride: 128
    tagger_epochs: 20
    rel_method: pairwise
    rel_epochs: 5
    class_weights:
      O: 1.0
      Premise: 1.0
      Claim: 1.0
    rel_class_weights:
      no-relation: 1.0
      Support: 1.0
      Attack: 1.0
      Partial-Attack: 1.0
    negative_sampling_ratio: 3.0

training:
  optimizer: adamw
  learning_rate: 3.0e-5
  weight_decay: 0.01
  num_epochs: 20
  batch_size: 16
  seeds: [42]

data:
  train: downloaded_data/public_data/public_data/track_2_train.json
  dev: downloaded_data/public_data/public_data/track_2_dev.json

notes: "Track 2 BETO baseline. Balanced data, no class weighting needed."
