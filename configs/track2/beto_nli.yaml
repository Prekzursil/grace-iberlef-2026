# GRACE @ IberLEF 2026 - Track 2 BETO + NLI relations
#
# Track 2 with NLI relation classifier. Since Track 2 has no Partial-Attack,
# the NLI mapping is clean: entailmentâ†’Support, contradictionâ†’Attack.
tag: t2-beto-nli-20ep
track: 2
backbone: dccuchile/bert-base-spanish-wwm-cased

task:
  subtask1:
    max_length: 256
    include_correct_option: true
    epochs: 20

  subtask2:
    max_length: 512
    stride: 128
    tagger_epochs: 20
    rel_method: nli
    nli_backbone: cross-encoder/nli-deberta-v3-small
    rel_epochs: 5
    class_weights:
      O: 1.0
      Premise: 1.0
      Claim: 1.0
    rel_class_weights:
      no-relation: 1.0
      Support: 1.0
      Attack: 1.0
    negative_sampling_ratio: 3.0

training:
  optimizer: adamw
  learning_rate: 3.0e-5
  weight_decay: 0.01
  num_epochs: 20
  batch_size: 16
  seeds: [42]

data:
  train: downloaded_data/public_data/public_data/track_2_train.json
  dev: downloaded_data/public_data/public_data/track_2_dev.json

notes: "Track 2 BETO + NLI-DeBERTa for relations (clean mapping, no Partial-Attack)."
