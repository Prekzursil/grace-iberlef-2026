# GRACE @ IberLEF 2026 - BETO tagger + NLI relation classifier (small)
#
# NLI reframing: Support=entailment, Attack=contradiction.
# nli-deberta-v3-small (280M, SNLI+MNLI+FEVER+ANLI pretrained).
tag: beto-nli-small-20ep
track: 1
backbone: dccuchile/bert-base-spanish-wwm-cased

task:
  subtask1:
    max_length: 512
    stride: 128
    class_weights:
      O: 1.0
      Premise: 1.0
      Claim: 2.0
      MajorClaim: 8.0

  subtask2:
    method: nli
    nli_backbone: cross-encoder/nli-deberta-v3-small
    max_length: 512
    rel_epochs: 5
    partial_attack_threshold: 0.3
    class_weights:
      no-relation: 1.0
      Support: 1.0
      Attack: 15.0
      Partial-Attack: 5.0
    negative_sampling_ratio: 3.0

training:
  optimizer: adamw
  learning_rate: 3.0e-5
  weight_decay: 0.01
  num_epochs: 20
  batch_size: 16
  seeds: [42]

data:
  train: downloaded_data/public_data/public_data/track_1_train.json
  dev: downloaded_data/public_data/public_data/track_1_dev.json

notes: "BETO tagger + NLI-DeBERTa-v3-small for relations. HiTZ method."
