# GRACE @ IberLEF 2026 - BETO tagger + multilingual NLI relation classifier
#
# Multilingual NLI backbone (SNLI+MNLI+ANLI+XNLI) — may handle Spanish
# argument structure better than English-only NLI models.
tag: beto-nli-xlmr-20ep
track: 1
backbone: dccuchile/bert-base-spanish-wwm-cased

task:
  subtask1:
    max_length: 512
    stride: 128
    class_weights:
      O: 1.0
      Premise: 1.0
      Claim: 2.0
      MajorClaim: 8.0

  subtask2:
    method: nli
    nli_backbone: symanto/xlm-roberta-base-snli-mnli-anli-xnli
    max_length: 512
    rel_epochs: 5
    partial_attack_threshold: 0.3
    class_weights:
      no-relation: 1.0
      Support: 1.0
      Attack: 15.0
      Partial-Attack: 5.0
    negative_sampling_ratio: 3.0

training:
  optimizer: adamw
  learning_rate: 3.0e-5
  weight_decay: 0.01
  num_epochs: 20
  batch_size: 16
  seeds: [42]

data:
  train: downloaded_data/public_data/public_data/track_1_train.json
  dev: downloaded_data/public_data/public_data/track_1_dev.json

notes: "BETO tagger + multilingual XLM-R NLI (SNLI+MNLI+ANLI+XNLI). Spanish-capable."
