# GRACE @ IberLEF 2026 - Track 1 XLM-R-base baseline config.
#
# Smoke-test baseline. XLM-R-large training happens on Kaggle via
# configs/track1/xlmr_large_base.yaml. BETO debug config lives at
# configs/track1/beto_base.yaml.
tag: xlmr-base-baseline
track: 1
backbone: xlm-roberta-base

task:
  subtask1:
    max_length: 512
    stride: 128
    # Class weights inversely proportional to frequency in Track 1 train:
    # Premise 1536 (68%), Claim 666 (29%), MajorClaim 64 (3%).
    # MajorClaim gets a ~10x weight to compensate for rare-class drag
    # on macro F1 (the official Track 1 subtask 1 metric).
    class_weights:
      O: 1.0
      Premise: 1.0
      Claim: 2.0
      MajorClaim: 8.0

  subtask2:
    max_length: 512
    input_scheme: marker_typed
    # Relation weights from the audit: Support 1213 (86%), Partial-Attack
    # 169 (12%), Attack 36 (2.5%). Attack is extremely rare so it gets
    # the biggest weight.
    class_weights:
      no-relation: 1.0
      Support: 1.0
      Attack: 15.0
      Partial-Attack: 5.0
    negative_sampling_ratio: 3.0

training:
  optimizer: adamw
  learning_rate: 2.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.1
  num_epochs: 10
  batch_size: 16
  gradient_accumulation_steps: 2
  mixed_precision: fp16
  seeds: [41, 42, 43]
  early_stopping_patience: 3
  early_stopping_metric: subtask1_official

data:
  train: downloaded_data/public_data/public_data/track_1_train.json
  dev: downloaded_data/public_data/public_data/track_1_dev.json

augmentation:
  enabled: false

notes: "XLM-R base baseline, no augmentation, all three seeds. Target dev subtask1 >= 0.40."
