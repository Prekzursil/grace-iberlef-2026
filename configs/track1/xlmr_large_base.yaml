# GRACE @ IberLEF 2026 - Track 1 XLM-R-large baseline config (A0 ablation).
#
# This is the unaugmented XLM-R-large baseline. Phase 5 augmented runs
# inherit from this and override augmentation.enabled + augmentation sources.
# Runs on Kaggle P100 (won't fit on the user's RTX 4050 Laptop 6GB).
tag: xlmr-large-a0-baseline
track: 1
backbone: xlm-roberta-large

task:
  subtask1:
    max_length: 512
    stride: 128
    class_weights:
      O: 1.0
      Premise: 1.0
      Claim: 2.0
      MajorClaim: 8.0

  subtask2:
    max_length: 512
    input_scheme: marker_typed
    class_weights:
      no-relation: 1.0
      Support: 1.0
      Attack: 15.0
      Partial-Attack: 5.0
    negative_sampling_ratio: 3.0

training:
  optimizer: adamw
  learning_rate: 1.0e-5  # lower than base because large models want smaller lr
  weight_decay: 0.01
  warmup_ratio: 0.1
  num_epochs: 10
  batch_size: 8  # smaller batch to fit XLM-R-large on P100 16GB
  gradient_accumulation_steps: 4  # effective batch 32
  mixed_precision: fp16
  seeds: [41, 42, 43]
  early_stopping_patience: 3
  early_stopping_metric: subtask1_official

data:
  train: downloaded_data/public_data/public_data/track_1_train.json
  dev: downloaded_data/public_data/public_data/track_1_dev.json

augmentation:
  enabled: false

notes: "A0 ablation: XLM-R-large, no augmentation. Target dev subtask1 >= 0.55 per design §3.2."
