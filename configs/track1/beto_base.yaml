# GRACE @ IberLEF 2026 - Track 1 BETO local debug config.
#
# BETO (bert-base-spanish-wwm-cased, 110M params) fits comfortably on
# the user's RTX 4050 6GB and is used for:
# - local smoke training during development
# - the paper's "second system" comparison point
# - rapid iteration on loss weighting and prompt engineering
tag: beto-base-baseline
track: 1
backbone: dccuchile/bert-base-spanish-wwm-cased

task:
  subtask1:
    max_length: 512
    stride: 128
    class_weights:
      O: 1.0
      Premise: 1.0
      Claim: 2.0
      MajorClaim: 8.0

  subtask2:
    max_length: 512
    input_scheme: marker_typed
    class_weights:
      no-relation: 1.0
      Support: 1.0
      Attack: 15.0
      Partial-Attack: 5.0
    negative_sampling_ratio: 3.0

training:
  optimizer: adamw
  learning_rate: 3.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.1
  num_epochs: 20
  batch_size: 16
  gradient_accumulation_steps: 1
  mixed_precision: fp16
  seeds: [42]  # single seed for fast iteration; 3 seeds in final config
  early_stopping_patience: 3
  early_stopping_metric: subtask1_official

data:
  train: downloaded_data/public_data/public_data/track_1_train.json
  dev: downloaded_data/public_data/public_data/track_1_dev.json

augmentation:
  enabled: false

notes: "BETO local debug + paper second-system. Expected dev subtask1 ~0.50."
